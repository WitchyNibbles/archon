services:
  archon-postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: ${ARCHON_DOCKER_CONTAINER_NAME:-archon-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ARCHON_POSTGRES_DB:-archon}
      POSTGRES_USER: ${ARCHON_POSTGRES_USER:-archon}
      POSTGRES_PASSWORD: ${ARCHON_POSTGRES_PASSWORD:-archon-local-password}
    ports:
      - "127.0.0.1:${ARCHON_POSTGRES_PORT:-5533}:5432"
    volumes:
      - archon-postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ARCHON_POSTGRES_USER:-archon} -d ${ARCHON_POSTGRES_DB:-archon}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  archon-postgres-data:
