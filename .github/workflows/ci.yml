name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  release-overlay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ARCHON_REVIEW_IDENTITY_BINDINGS: .archon/templates/review-identity-bindings.json
      ARCHON_REVIEW_IDENTITY_FIXTURES: .archon/templates/review-identity-adapter.fixture.json

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:release-overlay

  live-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18
        env:
          POSTGRES_DB: archon
          POSTGRES_USER: archon
          POSTGRES_PASSWORD: archon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archon -d archon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ARCHON_CORE_DATABASE_URL: postgresql://archon:archon@127.0.0.1:5432/archon
      ARCHON_WORKSPACE_SLUG: ci
      ARCHON_WORKSPACE_NAME: CI Workspace
      ARCHON_PROJECT_SLUG: archon-ci
      ARCHON_PROJECT_NAME: archon-ci
      ARCHON_PROJECT_REPO_PATH: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:migrations:live

  windows-setup-smoke:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: node --experimental-strip-types --test tests/setup-powershell-smoke.test.ts

  property-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:properties

  required-checks:
    if: ${{ always() }}
    needs:
      - release-overlay
      - live-migrations
      - windows-setup-smoke
      - property-regressions
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enforce required job results
        env:
          RELEASE_OVERLAY_RESULT: ${{ needs.release-overlay.result }}
          LIVE_MIGRATIONS_RESULT: ${{ needs.live-migrations.result }}
          WINDOWS_SETUP_SMOKE_RESULT: ${{ needs.windows-setup-smoke.result }}
          PROPERTY_REGRESSIONS_RESULT: ${{ needs.property-regressions.result }}
        run: |
          echo "release-overlay: ${RELEASE_OVERLAY_RESULT}"
          echo "live-migrations: ${LIVE_MIGRATIONS_RESULT}"
          echo "windows-setup-smoke: ${WINDOWS_SETUP_SMOKE_RESULT}"
          echo "property-regressions: ${PROPERTY_REGRESSIONS_RESULT}"

          test "${RELEASE_OVERLAY_RESULT}" = "success"
          test "${LIVE_MIGRATIONS_RESULT}" = "success"
          test "${WINDOWS_SETUP_SMOKE_RESULT}" = "success"
          test "${PROPERTY_REGRESSIONS_RESULT}" = "success"
