name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  release-overlay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ARCHON_REVIEW_IDENTITY_BINDINGS: .archon/templates/review-identity-bindings.json
      ARCHON_REVIEW_IDENTITY_FIXTURES: .archon/templates/review-identity-adapter.fixture.json

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:release-overlay

  live-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18
        env:
          POSTGRES_DB: archon
          POSTGRES_USER: archon
          POSTGRES_PASSWORD: archon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archon -d archon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ARCHON_CORE_DATABASE_URL: postgresql://archon:archon@127.0.0.1:5432/archon
      ARCHON_WORKSPACE_SLUG: ci
      ARCHON_WORKSPACE_NAME: CI Workspace
      ARCHON_PROJECT_SLUG: archon-ci
      ARCHON_PROJECT_NAME: archon-ci
      ARCHON_PROJECT_REPO_PATH: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run verify:migrations:live

  # NOTE: a windows-setup-smoke job and a property-regressions job were removed here.
  # Both referenced artifacts that do not exist (tests/setup-powershell-smoke.test.ts
  # and an npm "test:properties" script with no property tests), so they could never
  # pass. They are tracked as follow-up initiatives: real Windows install/setup CI
  # coverage, and a property-based regression suite. Re-add each job only once it runs
  # a real, green-able check.

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # ESLint (flat config, typescript-eslint). Fails on any error; dead imports
      # are error-level so they cannot regress. Unused locals remain warnings.
      - run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # Runs the full suite under c8 and enforces the coverage ratchet floor
      # (package.json "c8" key). Fails on test failure OR coverage regression.
      - run: npm run check:coverage

  # P1 pack-install smoke: proves the compiled package is self-contained and
  # invocable via the bin without --experimental-strip-types.  Added to
  # required-checks so tarball validation gates merges (all 4 legs: Linux+Windows,
  # Node 22+24).
  pack-install:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ["22", "24"]

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build dist
        run: npm run build:dist

      # Pack → install into a clean temp dir → run smoke checks (unix)
      - name: Pack and install in clean temp dir (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PACK_DIR="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"

          TARBALL="$(npm pack --pack-destination "$PACK_DIR" 2>/dev/null | tail -1)"
          TARBALL_PATH="$PACK_DIR/$TARBALL"

          cd "$INSTALL_DIR"
          npm init -y --quiet
          npm install --quiet "$TARBALL_PATH"

          # archon --help must exit 0
          node ./node_modules/.bin/archon --help

          # archon doctor: DB error (exit 1) is acceptable; module-not-found is not
          node ./node_modules/.bin/archon doctor || {
            code=$?
            if [ "$code" -ne 1 ]; then
              printf 'archon doctor exited with unexpected code %d\n' "$code" >&2
              exit 1
            fi
          }

          # Assert dist tree cleanliness:
          #   1. No "--experimental-strip-types" adjacent to "node_modules" — this is
          #      the specific bug pattern that was fixed (installer writing old-form
          #      scripts that invoke archon via node --experimental-strip-types
          #      ./node_modules/archon/src/...). String literals in usage messages and
          #      archon:check-workflow templates (consumer-local .ts files) are fine.
          #   2. No relative .ts import specifiers — confirms the esbuild rewrite ran.
          node --input-type=module - "$INSTALL_DIR/node_modules/archon/dist" << 'JSEOF'
          import { readdirSync, readFileSync } from "node:fs";
          import path from "node:path";
          function walk(dir) {
            const out = [];
            for (const e of readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...walk(full));
              else if (e.isFile() && e.name.endsWith(".js")) out.push(full);
            }
            return out;
          }
          const files = walk(process.argv[2]);
          // Matches strip-types combined with node_modules — the original bug pattern.
          const stripTypesNodeModules = /--experimental-strip-types[^'"\n]*node_modules/;
          // Matches relative .ts import specifiers (build rewrite must have removed these).
          const tsDotImport = /from ['"]\..*\.ts['"]/m;
          let failed = false;
          for (const f of files) {
            const src = readFileSync(f, "utf8");
            if (stripTypesNodeModules.test(src)) {
              console.error("FAIL: --experimental-strip-types+node_modules in " + f); failed = true;
            }
            if (tsDotImport.test(src)) {
              console.error("FAIL: .ts import specifier in " + f); failed = true;
            }
          }
          if (failed) process.exit(1);
          console.log("OK: dist tree is clean (" + files.length + " .js files checked)");
          JSEOF

          # Also grep shipped shell scripts for node_modules/archon/src references.
          # The dist/ scan above misses .sh files (they are not compiled JS).
          # This is the class of bug that check-archon-workflow-live.sh carried before P1.
          node --input-type=module - "$INSTALL_DIR/node_modules/archon/scripts" << 'JSEOF'
          import { readdirSync, readFileSync } from "node:fs";
          import path from "node:path";
          const scriptsDir = process.argv[2];
          let failed = false;
          for (const name of readdirSync(scriptsDir)) {
            if (!name.endsWith(".sh") && !name.endsWith(".ps1")) continue;
            const content = readFileSync(path.join(scriptsDir, name), "utf8");
            if (/node_modules\/archon\/src/.test(content)) {
              console.error("FAIL: node_modules/archon/src in scripts/" + name); failed = true;
            }
          }
          if (failed) process.exit(1);
          console.log("OK: no node_modules/archon/src in shipped scripts");
          JSEOF

          # No lifecycle install hooks in package.json
          node --input-type=module - "$INSTALL_DIR/node_modules/archon/package.json" << 'JSEOF'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync(process.argv[2], "utf8"));
          for (const h of ["postinstall", "install", "preinstall"]) {
            if (pkg.scripts?.[h]) {
              console.error("FAIL: forbidden lifecycle hook: " + h); process.exit(1);
            }
          }
          console.log("OK: no lifecycle install hooks");
          JSEOF

      # Pack → install into a clean temp dir → run smoke checks (windows)
      # Uses temp .mjs files for inline JS (PowerShell has no bash <<< here-string).
      - name: Pack and install in clean temp dir (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packDir  = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          $installDir = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $packDir  | Out-Null
          New-Item -ItemType Directory -Path $installDir | Out-Null

          $tarball = npm pack --pack-destination $packDir 2>$null | Select-Object -Last 1
          $tarballPath = Join-Path $packDir $tarball

          Push-Location $installDir
          npm init -y --quiet
          npm install --quiet $tarballPath

          # archon --help must exit 0
          node ./node_modules/.bin/archon --help
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # archon doctor: DB error (exit 1) acceptable; anything else is a failure
          node ./node_modules/.bin/archon doctor
          $code = $LASTEXITCODE
          if ($code -ne 0 -and $code -ne 1) {
            Write-Error "archon doctor exited with unexpected code $code"
            exit 1
          }

          # Helper: write JS to a temp .mjs file, run it with $arg, clean up.
          # Uses a temp .mjs file because PowerShell has no bash <<< here-string;
          # .mjs extension ensures Node treats the file as an ES module.
          function Invoke-NodeScript([string]$Script, [string]$Arg) {
            $tmp = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString() + ".mjs")
            Set-Content -Path $tmp -Encoding UTF8 -Value $Script
            node $tmp $Arg
            $ec = $LASTEXITCODE
            Remove-Item -Path $tmp -Force -ErrorAction SilentlyContinue
            if ($ec -ne 0) { exit $ec }
          }

          # Dist tree inspection (same logic as unix step)
          $distPath = Join-Path $installDir "node_modules\archon\dist"
          Invoke-NodeScript -Arg $distPath -Script @'
import { readdirSync, readFileSync } from "node:fs";
import path from "node:path";
function walk(dir) {
  const out = [];
  for (const e of readdirSync(dir, { withFileTypes: true })) {
    const full = path.join(dir, e.name);
    if (e.isDirectory()) out.push(...walk(full));
    else if (e.isFile() && e.name.endsWith(".js")) out.push(full);
  }
  return out;
}
const files = walk(process.argv[2]);
const stripTypesNodeModules = /--experimental-strip-types[^'"\n]*node_modules/;
const tsDotImport = /from ['"]\..*\.ts['"]/m;
let failed = false;
for (const f of files) {
  const src = readFileSync(f, "utf8");
  if (stripTypesNodeModules.test(src)) {
    console.error("FAIL: --experimental-strip-types+node_modules in " + f); failed = true;
  }
  if (tsDotImport.test(src)) {
    console.error("FAIL: .ts import specifier in " + f); failed = true;
  }
}
if (failed) process.exit(1);
console.log("OK: dist tree is clean (" + files.length + " .js files checked)");
'@

          # Shell scripts: no node_modules/archon/src references (same as unix step)
          $scriptsPath = Join-Path $installDir "node_modules\archon\scripts"
          Invoke-NodeScript -Arg $scriptsPath -Script @'
import { readdirSync, readFileSync } from "node:fs";
import path from "node:path";
const scriptsDir = process.argv[2];
let failed = false;
for (const name of readdirSync(scriptsDir)) {
  if (!name.endsWith(".sh") && !name.endsWith(".ps1")) continue;
  const content = readFileSync(path.join(scriptsDir, name), "utf8");
  if (/node_modules\/archon\/src/.test(content)) {
    console.error("FAIL: node_modules/archon/src in scripts/" + name); failed = true;
  }
}
if (failed) process.exit(1);
console.log("OK: no node_modules/archon/src in shipped scripts");
'@

          # No lifecycle install hooks in package.json
          $pkgPath = Join-Path $installDir "node_modules\archon\package.json"
          Invoke-NodeScript -Arg $pkgPath -Script @'
import { readFileSync } from "node:fs";
const pkg = JSON.parse(readFileSync(process.argv[2], "utf8"));
for (const h of ["postinstall", "install", "preinstall"]) {
  if (pkg.scripts?.[h]) {
    console.error("FAIL: forbidden lifecycle hook: " + h); process.exit(1);
  }
}
console.log("OK: no lifecycle install hooks");
'@

          Pop-Location

  required-checks:
    if: ${{ always() }}
    needs:
      - release-overlay
      - live-migrations
      - lint
      - unit-tests
      - pack-install
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enforce required job results
        env:
          RELEASE_OVERLAY_RESULT: ${{ needs.release-overlay.result }}
          LIVE_MIGRATIONS_RESULT: ${{ needs.live-migrations.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          PACK_INSTALL_RESULT: ${{ needs.pack-install.result }}
        run: |
          echo "release-overlay: ${RELEASE_OVERLAY_RESULT}"
          echo "live-migrations: ${LIVE_MIGRATIONS_RESULT}"
          echo "lint: ${LINT_RESULT}"
          echo "unit-tests: ${UNIT_TESTS_RESULT}"
          echo "pack-install: ${PACK_INSTALL_RESULT}"

          test "${RELEASE_OVERLAY_RESULT}" = "success"
          test "${LIVE_MIGRATIONS_RESULT}" = "success"
          test "${LINT_RESULT}" = "success"
          test "${UNIT_TESTS_RESULT}" = "success"
          test "${PACK_INSTALL_RESULT}" = "success"
