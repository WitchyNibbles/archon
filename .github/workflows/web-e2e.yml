name: Web E2E

# Non-required CI job — intentionally NOT wired into the required-checks
# job in ci.yml. Playwright browser test flakes must never block merges to
# master by failing the core daemon/migration pipeline.
#
# Rollback path: delete this file or disable the workflow in GitHub UI.
# The core CI contract (ci.yml required-checks) is unaffected because this
# job is never listed in the required-checks matrix.
#
# ==========================================================================
# C8 — Promote-to-required criterion (Decision 6, forgePhase1Council)
# ==========================================================================
# This job graduates to a required check ONLY when ALL of the following are met:
#
#   1. 15 consecutive green runs on master branch (not PRs alone).
#      Check mechanism: in the GitHub UI go to Actions → "Web E2E" → filter
#      by branch "master". Count the most-recent green (success) runs
#      sequentially without any failure or skip in between. A cancelled run
#      counts as a break; a skipped run (no web/** paths changed) does not
#      count toward the 15 but does not break the streak.
#   2. Owner role `frontend_designer` manually verifies the 15-green streak
#      and opens a PR that adds this workflow name to the required-checks
#      matrix in ci.yml.
#   3. That PR must pass the standard review gates (reviewer, qa_engineer,
#      security_reviewer) before merge.
#
# Until those criteria are met, this job is advisory only.
# ==========================================================================

on:
  push:
    branches:
      - master
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"
  pull_request:
    branches:
      - master
    paths:
      - "web/**"
      - ".github/workflows/web-e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  web-e2e:
    name: Web E2E (non-required)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cache both lockfiles: root deps are the codegen BUILD toolchain and
          # web deps are the app. Keying on both keeps the npm cache valid when
          # either changes.
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # R2-C rationale: the Playwright webServer command (see web/playwright.config.ts)
      # runs `npm run build` inside web/, which first executes `gen:types`. That script
      # runs the ROOT generator `src/forge/gen-dashboard-types.ts` via Node, which
      # imports `zod` from ROOT node_modules. That generator is a BUILD-TIME toolchain
      # only — it emits the gitignored `web/src/types/dashboard.generated.ts` (pure
      # TypeScript types, zero runtime deps). Installing root deps here provisions that
      # toolchain only; it does NOT breach R2-C: the web runtime bundle still imports
      # nothing from the repo `src/**` (the eslint import wall enforces this) and `zod`
      # never enters the web bundle. Without this step, Playwright's webServer build
      # fails at `gen:types` with ERR_MODULE_NOT_FOUND (zod).
      - name: Install root deps (codegen toolchain)
        run: npm ci

      # C8 / workspace isolation: install web app deps from web/package-lock.json ONLY.
      # Never run a root `npm ci` that resolves web app deps — the web package is a
      # self-contained workspace with its own lockfile (R2-C hard boundary). All web
      # toolchain packages (Vite, React, Playwright, Tailwind) are pinned exactly here.
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      # Install only the Chromium browser (matches the two projects in playwright.config.ts:
      # desktop-chromium and mobile-chromium). `--with-deps` installs OS-level libs required
      # by the browser on the ubuntu-latest runner.
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
