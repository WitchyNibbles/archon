name: Release

# Publishes @witchynibbles/archon to the public npm registry.
#
# Trigger: a version tag pushed to the repo (e.g. git tag v0.1.0 && git push --tags).
# The job fails fast if the git tag does not match the version in package.json,
# so a mismatch is caught before any publish attempt.
#
# Required repo secret: NPM_TOKEN — a Granular Access Token with Read+Write on
# @witchynibbles/archon.  The token is never written to files; it is injected
# into the publish step environment only.
#
# Rollback: npm deprecate @witchynibbles/archon@<version> "broken release" and
# then publish a fixed version.  npm does not allow un-publishing after 72 h;
# use deprecation for broken releases instead.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  publish:
    environment: npm-publish  # Operator: configure this environment in GitHub Settings → Environments
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      # Guard: the git tag (e.g. v0.1.0) must exactly match v<package.json version>.
      # A mismatch means someone pushed a tag without bumping the version — fail now,
      # before anything is built or published.
      - name: Assert tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [ "$GIT_TAG" != "$PKG_VERSION" ]; then
            echo "error: git tag ($GIT_TAG) does not match package.json version ($PKG_VERSION)"
            echo "Bump version in package.json to match the tag, commit to master, then re-push the tag."
            exit 1
          fi
          echo "Tag matches package version: $GIT_TAG — proceeding with publish"

      # Build compiled JS + type declarations before publish.
      # prepublishOnly (package.json) runs the same steps; the explicit build here
      # makes the workflow self-documenting and lets the publish step use
      # --ignore-scripts to avoid a redundant second build.
      - name: Build dist and types
        run: npm run build:dist && npm run build:types

      # Publish to the public npm registry.  --access public is required for
      # scoped packages (@witchynibbles/archon) on a first publish or without a
      # pre-existing public access setting.  NODE_AUTH_TOKEN is set from the
      # NPM_TOKEN repo secret and is never logged.
      #
      # Pre-release detection: if the git tag contains a hyphen (e.g. v0.2.0-rc1),
      # publish under the "next" dist-tag instead of "latest" so unversioned consumers
      # (npm install @witchynibbles/archon) are never silently upgraded to a pre-release.
      - name: Publish to npm
        run: |
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$GIT_TAG" =~ - ]]; then
            DIST_TAG="next"
          else
            DIST_TAG="latest"
          fi
          npm publish --access public --ignore-scripts --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
